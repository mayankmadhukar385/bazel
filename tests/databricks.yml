bundle:
  name: dabproject
  uuid: b3f4d1c9-7f2e-4d80-9f21-2e3f5c4d5a6b  # generate a new UUID for this bundle

include:
  - resources/*.yml
  - resources/*/*.yml

variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    mode: development
    default: true
    presets:
      name_prefix: dev_${workspace.current_user.short_name}
      source_linked_deployment: false
    workspace:
      host: https://dbc-f258a182-511d.cloud.databricks.com/
    variables:
      catalog: assetbundles
      schema: ${workspace.current_user.short_name}

  stage:
    mode: production
    workspace:
      host: https://dbc-f258a182-511d.cloud.databricks.com/
      root_path: /Workspace/Users/mayank.madhukar@pwc.com/STAGE/.bundle/${bundle.name}/${bundle.target}/tests
    variables:
      catalog: assetbundles
      schema: Stage
    permissions:
      - user_name: mayank.madhukar@pwc.com
        level: CAN_MANAGE

  prod:
    mode: production
    workspace:
      host: https://dbc-f258a182-511d.cloud.databricks.com/
      root_path: /Workspace/Users/mayank.madhukar@pwc.com/PROD_MM_TEST/test/.bundle/${bundle.name}/${bundle.target}/tests
    variables:
      catalog: assetbundles
      schema: prod
    permissions:
      - user_name: mayank.madhukar@pwc.com
        level: CAN_MANAGE
