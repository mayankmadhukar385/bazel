bundle:
  name: dabproject
  uuid: 182eccf5-ef99-4c0a-af4a-44bb98a91b40  # generate a new UUID for each bundle

include:
  - resources/*.yml
  - resources/*/*.yml

variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    mode: development
    default: true
    presets:
      name_prefix: dev_${workspace.current_user.short_name}
      source_linked_deployment: false
    workspace:
      host: https://dbc-f258a182-511d.cloud.databricks.com/
    variables:
      catalog: assetbundles
      schema: ${workspace.current_user.short_name}

  stage:
    mode: production
    workspace:
      host: https://dbc-f258a182-511d.cloud.databricks.com/
      root_path: /Workspace/Users/mayank.madhukar@pwc.com/STAGE/.bundle/${bundle.name}/${bundle.target}/src
    variables:
      catalog: assetbundles
      schema: Stage
    permissions:
      - user_name: mayank.madhukar@pwc.com
        level: CAN_MANAGE

  prod:
    mode: production
    workspace:
      host: https://dbc-f258a182-511d.cloud.databricks.com/
      root_path: /Workspace/Users/mayank.madhukar@pwc.com/PROD_MM_TEST/.bundle/${bundle.name}/${bundle.target}/src
    variables:
      catalog: assetbundles
      schema: prod
    permissions:
      - user_name: mayank.madhukar@pwc.com
        level: CAN_MANAGE
