name: CI Workflow

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main

jobs:
  ci_job:
    name: CI job
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bazel
        uses: bazel-contrib/setup-bazel@v0.9.0

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip
          python -m pip --version

      - name: Install non-Bazel tools
        run: |
          pip install -r requirements-pyspark.txt
          pip install "pylint>=3.2.0" "nbqa>=1.8.0"

      - name: Lint Python files with pylint
        run: |
          python -m pylint src

      - name: Lint notebooks with nbqa + pylint
        run: |
          nbqa pylint resources --nbqa-shell

      - name: Run Bazel tests
        run: |
          bazel test //:test_utils //:test_service

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        run: |
          databricks bundle validate